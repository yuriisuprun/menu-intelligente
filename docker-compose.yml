services:
  db:
    image: supabase/postgres:15.8.1.060
    container_name: tavola_db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    ports:
      - "${POSTGRES_PORT:-54322}:5432"
    volumes:
      - tavola_db_data:/var/lib/postgresql/data
      - ./docker/postgres/00_roles.sql:/docker-entrypoint-initdb.d/00_roles.sql:ro
      - ./docker/postgres/01_auth.sql:/docker-entrypoint-initdb.d/01_auth.sql:ro
      - ./supabase/schema.sql:/docker-entrypoint-initdb.d/10_schema.sql:ro
      - ./supabase/patch_add_dishes_category.sql:/docker-entrypoint-initdb.d/20_patch.sql:ro
      - ./supabase/local_seed.sql:/docker-entrypoint-initdb.d/30_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 20

  rest:
    image: postgrest/postgrest:v12.2.8
    container_name: tavola_rest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${PGRST_DB_AUTHENTICATOR_PASSWORD:-authenticator}@db:5432/${POSTGRES_DB:-postgres}
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-token-with-at-least-32-characters}
      PGRST_SERVER_PORT: 3000
    ports:
      - "${POSTGREST_PORT:-54321}:3000"

  app:
    image: node:20-alpine
    container_name: tavola_app
    profiles: ["app"]
    working_dir: /workspace
    depends_on:
      rest:
        condition: service_started
    volumes:
      - ./:/workspace
      - tavola_node_modules:/workspace/node_modules
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-http://host.docker.internal:54321}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEXT_PUBLIC_TENANT_SLUG: ${NEXT_PUBLIC_TENANT_SLUG:-tavola-demo}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"

volumes:
  tavola_db_data:
  tavola_node_modules:
